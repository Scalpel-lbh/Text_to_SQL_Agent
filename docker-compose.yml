# 文件作用：
# 一键启动 FastAPI 数据分析 Agent 和 Redis 会话服务。

services:
  redis:
    image: redis:7
    container_name: data-analysis-agent-redis

    # 开启 AOF 持久化
    command: redis-server --appendonly yes

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

    # 检查 Redis 是否已经可以接受请求
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

    restart: unless-stopped

  api:
    # 使用当前目录中的 Dockerfile 构建 FastAPI 镜像
    build:
      context: .
      dockerfile: Dockerfile

    container_name: data-analysis-agent-api

    ports:
      - "8000:8000"

    environment:
      # 容器通过服务名 redis 访问 Redis，不能使用 localhost
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0

      # 从项目根目录的 .env 文件读取通义千问密钥
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY}

    # Redis 健康检查通过后再启动 API
    depends_on:
      redis:
        condition: service_healthy

    # 持久化容器中生成的 Chroma Schema 向量库
    volumes:
      - schema_chroma_data:/app/data/schema_chroma_db

    restart: unless-stopped


volumes:
  # 保存 Redis 会话数据
  redis_data:

  # 保存 Chroma Schema 向量数据
  schema_chroma_data: